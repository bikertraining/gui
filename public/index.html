<!DOCTYPE html>
<html class="h-100"
      lang="en">
<head>
    <meta charset="utf-8">
    <meta content="Learn to ride or improve your motorcycle skills. Get your ticket to ride!"
          name="description">
    <meta content="motorcycle, motorcycle training, brc, erc, trike, pensacola motorcycle, pensacola motorcycle training, motorcycle endorsement, learn to ride, biker training"
          name="keywords">
    <meta content="IE=edge"
          http-equiv="X-UA-Compatible">
    <meta content="no-cache"
          http-equiv="Pragma">
    <meta content="0"
          http-equiv="expires">
    <meta content="no-cache, no-store, must-revalidate"
          http-equiv="Cache-Control"/>
    <meta content="width=device-width,initial-scale=1.0"
          name="viewport">
    <link href="<%= BASE_URL %>favicon.ico"
          rel="icon">
    <title><%= htmlWebpackPlugin.options.title %></title>
</head>

<body class="d-flex flex-column min-vh-100 position-relative">
<noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
        Please enable it to continue.</strong>
</noscript>

<main id="app"
      class="flex-shrink-0"></main>
<!-- built files will be auto injected -->
</body>
</html>
